services:
  api:
    container_name: stockflow-api
    build:
      context: .
      dockerfile: src/StockFlow.Api/Dockerfile
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=StockFlowDb;User Id=sa;Password=${SQLSERVER_SA_PASSWORD:?Set SQLSERVER_SA_PASSWORD in .env};TrustServerCertificate=True;
      Jwt__Key: ${JWT_KEY:?Set JWT_KEY in .env}
      Jwt__Issuer: ${JWT_ISSUER:-StockFlow}
      Jwt__Audience: ${JWT_AUDIENCE:-StockFlowClients}
      Bootstrap__ApplyMigrations: ${BOOTSTRAP_APPLY_MIGRATIONS:-true}
      Bootstrap__SeedDemoData: ${BOOTSTRAP_SEED_DEMO_DATA:-false}
    ports:
      - "${API_HTTP_PORT:-8080}:8080"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: stockflow-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      SA_PASSWORD: "${SQLSERVER_SA_PASSWORD:?Set SQLSERVER_SA_PASSWORD in .env}"
    ports:
      - "${SQLSERVER_SQL_PORT:-1433}:1433"
    volumes:
      - stockflow_sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P $$SA_PASSWORD -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  stockflow_sqlserver_data:
