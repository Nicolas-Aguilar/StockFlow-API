name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore StockFlow.sln

      - name: Build solution
        run: dotnet build StockFlow.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test StockFlow.sln --configuration Release --no-build
